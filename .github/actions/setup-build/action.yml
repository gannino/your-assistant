name: 'Setup and Build'
description: 'Checkout, setup Node, install dependencies, and cache'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '24'
  cache-key-prefix:
    description: 'Prefix for cache keys'
    required: false
    default: 'deps'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Cache node_modules
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ~/.npm
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-node-

    - name: Install dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci
