name: CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # SETUP JOB - Install dependencies once and create reusable artifacts
  # ============================================
  setup:
    name: Setup and Quality Checks
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.set-node-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set Node version output
        id: set-node-version
        run: echo "version=24" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint:check

      - name: Run formatting check
        run: npm run format:check

      - name: Build Vue app for web
        run: npm run build

      - name: Upload Vue build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: dist/
          retention-days: 1

  # ============================================
  # TEST JOB - Run tests across Node versions
  # ============================================
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: [24.x, 25.x]
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Vue build artifact
        uses: actions/download-artifact@v4
        with:
          name: vue-dist
          path: dist/

      - name: Run tests with coverage
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '25.x'
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================
  # BUILD ELECTRON BASE - Build Vue app for Electron once
  # ============================================
  build-electron-base:
    name: Build Electron Base
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app for Electron
        run: npm run build
        env:
          ELECTRON_BUILD: 'true'

      - name: Upload Electron Vue build artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-vue-dist
          path: dist/
          retention-days: 1

  # ============================================
  # BUILD MACOS - Build macOS Electron app
  # ============================================
  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    needs: [setup, test, build-electron-base]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Electron Vue build artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-vue-dist
          path: dist/

      - name: Build Electron app for macOS
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and generate build checksums
        run: |
          cd release
          find . -type f \( -name "*.dmg" -o -name "*.zip" \) -exec shasum -a 256 {} \; > checksums.txt
          cat checksums.txt

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: your-assistant-mac
          path: |
            release/*.dmg
            release/*.zip
            release/checksums.txt
          retention-days: 30

  # ============================================
  # BUILD WINDOWS - Build Windows Electron app
  # ============================================
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: [setup, test, build-electron-base]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Electron Vue build artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-vue-dist
          path: dist/

      - name: Build Electron app for Windows
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: your-assistant-windows
          path: |
            release/*.exe
            release/*.zip
          retention-days: 30

  # ============================================
  # BUILD LINUX - Build Linux Electron app
  # ============================================
  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    needs: [setup, test, build-electron-base]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Electron Vue build artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-vue-dist
          path: dist/

      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot xorriso rpm libxkbfile-dev libsecret-1-dev

      - name: Build Electron app for Linux
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: your-assistant-linux
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 30

  # ============================================
  # DEPLOY PAGES - Deploy to GitHub Pages
  # ============================================
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download Vue build artifact
        uses: actions/download-artifact@v4
        with:
          name: vue-dist
          path: dist/

      - name: Check build output
        run: |
          echo "Checking build output..."
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed: index.html not found"
            exit 1
          fi
          echo "✅ Build output verified"

      - name: Upload artifact for Pages deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployment
        run: |
          echo "🚀 Deployed to: ${{ steps.deployment.outputs.page_url }}"
          echo "⏳ Waiting for deployment to propagate..."
          sleep 10

          url="${{ steps.deployment.outputs.page_url }}"
          if curl -f -s -o /dev/null "$url"; then
            echo "✅ Deployment verified: $url is accessible"
          else
            echo "⚠️ Warning: Could not verify deployment accessibility"
          fi

  # ============================================
  # RELEASE - Create GitHub Release
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [setup, test, build-mac, build-windows, build-linux]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/your-assistant-mac/*.dmg
            release-artifacts/your-assistant-mac/*.zip
            release-artifacts/your-assistant-mac/checksums.txt
            release-artifacts/your-assistant-windows/*.exe
            release-artifacts/your-assistant-windows/*.zip
            release-artifacts/your-assistant-linux/*.AppImage
            release-artifacts/your-assistant-linux/*.deb
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # AUTO RELEASE - Automatically bump version and create release on merge to main
  # ============================================
  auto-release:
    name: Auto-Create Release
    runs-on: ubuntu-latest
    needs: [setup, test, build-mac, build-windows, build-linux]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Extract version number (remove 'v' prefix)
          CURRENT_VERSION="${LATEST_TAG#v}"
          echo "Current version: $CURRENT_VERSION"

          # Bump patch version
          NEW_VERSION=$(echo $CURRENT_VERSION | awk -F. '{print $1"."$2"."$3+1}')
          echo "New version: $NEW_VERSION"

          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version

          # Commit the version bump
          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION"

          # Create and push tag
          git tag "v$NEW_VERSION"
          git push origin main
          git push origin "v$NEW_VERSION"

          echo "✅ Created release v$NEW_VERSION"
