name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Check for release-worthy commits
        id: check-commits
        run: |
          # Check if there are any commits that would trigger a release
          if git log --oneline -10 | grep -E "(feat|fix|perf|refactor)"; then
            echo "release-worthy=true" >> $GITHUB_OUTPUT
            echo "✅ Found release-worthy commits"
          else
            echo "release-worthy=false" >> $GITHUB_OUTPUT
            echo "⚠️ No release-worthy commits found (feat, fix, perf, refactor)"
          fi

      - name: Semantic Release
        if: steps.check-commits.outputs.release-worthy == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 Running semantic-release in dry-run mode..."
            npx semantic-release --dry-run
          else
            echo "🚀 Running semantic-release..."
            npx semantic-release
          fi
