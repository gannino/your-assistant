name: Test and Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Fast checks that don't need matrix testing
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint:check

      - name: Run formatting check
        run: npm run format:check

  # Test matrix across Node versions
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      matrix:
        node-version: [24.x, 25.x]
      fail-fast: false  # Don't cancel all jobs if one fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '25.x'  # Only upload once
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Electron build validation (optional, runs only on main)
  electron-build-check:
    name: Validate Electron Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot xorriso rpm

      - name: Build Vue app for Electron
        run: ELECTRON_BUILD=true npx vue-cli-service build
        env:
          ELECTRON_BUILD: 'true'

      - name: Build Electron app for Linux (quick validation)
        run: npm run electron:build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Electron build output
        run: |
          echo "Checking Electron build output..."
          if [ ! -d "release" ]; then
            echo "❌ Electron build failed: release directory not found"
            exit 1
          fi
          echo "✅ Electron build verified"
          ls -la release/
