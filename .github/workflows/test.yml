name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Fast checks that don't need matrix testing
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint:check

      - name: Run formatting check
        run: npm run format:check

  # Test matrix across Node versions - FAIL FAST
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        node-version: [24.x, 25.x]
      fail-fast: true  # Cancel all jobs if any fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests with coverage
        run: |
          # Set NODE_OPTIONS to prevent memory issues in CI
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '25.x' && github.event_name == 'push'
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Build artifacts once after tests pass
  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app for Electron
        run: ELECTRON_BUILD=true npx vue-cli-service build
        env:
          ELECTRON_BUILD: 'true'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vue-build
          path: dist/
          retention-days: 7

  # Electron build jobs that use shared artifacts
  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    needs: [quality, test, build-artifacts]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Vue build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vue-build
          path: dist/

      - name: Build Electron app for macOS
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build checksums
        run: |
          cd release/mac-arm64
          shasum -a 256 *.dmg *.zip > checksums.txt
          cat checksums.txt

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: your-assistant-mac-arm64
          path: |
            release/mac-arm64/*.dmg
            release/mac-arm64/*.zip
            release/mac-arm64/checksums.txt
          retention-days: 30

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: [quality, test, build-artifacts]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Vue build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vue-build
          path: dist/

      - name: Build Electron app for Windows
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: your-assistant-windows
          path: |
            release/*.exe
            release/*.zip
          retention-days: 30

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    needs: [quality, test, build-artifacts]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot xorriso rpm libxkbfile-dev libsecret-1-dev

      - name: Download Vue build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vue-build
          path: dist/

      - name: Build Electron app for Linux
        run: npm run electron:build:linux:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: your-assistant-linux
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 30

  # Release job that depends on all builds
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [quality, test, build-mac, build-windows, build-linux]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/your-assistant-mac-arm64/*.dmg
            release-artifacts/your-assistant-mac-arm64/*.zip
            release-artifacts/your-assistant-mac-arm64/checksums.txt
            release-artifacts/your-assistant-windows/*.exe
            release-artifacts/your-assistant-windows/*.zip
            release-artifacts/your-assistant-linux/*.AppImage
            release-artifacts/your-assistant-linux/*.deb
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
