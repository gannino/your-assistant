name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - mac
          - windows
          - linux
          - all

permissions:
  contents: write
  id-token: write

jobs:
  build-mac:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app for Electron
        run: ELECTRON_BUILD=true npx vue-cli-service build
        env:
          ELECTRON_BUILD: 'true'

      - name: Verify build output
        run: |
          echo "Checking build output..."
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed: index.html not found"
            exit 1
          fi
          echo "✅ Build output verified"
          echo "Dist contents:"
          ls -la dist/

      - name: Build Electron app for macOS
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check build output
        run: |
          echo "Checking Electron build output..."
          if [ ! -d "release/mac-arm64" ]; then
            echo "❌ Electron build failed: release/mac-arm64 not found"
            exit 1
          fi
          if [ ! -d "release/mac-arm64/Your Assistant.app" ]; then
            echo "❌ Electron build failed: .app bundle not found"
            exit 1
          fi
          echo "✅ Electron build verified"
          echo "Release contents:"
          ls -la release/mac-arm64/

      - name: Generate build checksums
        run: |
          cd release/mac-arm64
          shasum -a 256 *.dmg *.zip > checksums.txt
          cat checksums.txt

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: your-assistant-mac-arm64
          path: |
            release/mac-arm64/*.dmg
            release/mac-arm64/*.zip
            release/mac-arm64/checksums.txt
          retention-days: 30

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            release/mac-arm64/*.dmg
            release/mac-arm64/*.zip
            release/mac-arm64/checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app for Electron
        run: |
          $env:ELECTRON_BUILD = "true"
          npx vue-cli-service build
        env:
          ELECTRON_BUILD: 'true'

      - name: Build Electron app for Windows
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: your-assistant-windows
          path: |
            release/*.exe
            release/*.zip
          retention-days: 30

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v2
        if: success() && startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            release/*.exe
            release/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot xorriso rpm libxkbfile-dev libsecret-1-dev

      - name: Build Vue app for Electron
        run: ELECTRON_BUILD=true npx vue-cli-service build
        env:
          ELECTRON_BUILD: 'true'

      - name: Build Electron app for Linux
        run: npm run electron:build:linux:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: your-assistant-linux
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 30

      - name: Upload Linux artifacts to release
        uses: softprops/action-gh-release@v2
        if: success() && startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            release/*.AppImage
            release/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-all:
    name: Build All Platforms
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && inputs.platform == 'all'
    needs: [build-mac, build-windows, build-linux]
    steps:
      - name: All builds complete
        run: echo "✅ All platform builds completed successfully"
