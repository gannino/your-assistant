<svg width="360" height="80" viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon group -->
  <g transform="translate(8,12)">
    <!-- Bubble body -->
    <rect x="0" y="0" width="52" height="32" rx="14"
          fill="#020617"
          stroke="#1E293B"
          stroke-width="2.4"/>

    <!-- Rounded side tail -->
