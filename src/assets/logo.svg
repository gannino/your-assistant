          stroke-linecap="round"/>

    <!-- Circuit 'Y' -->
    <line x1="24" y1="8" x2="24" y2="20"
          stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="24" y1="12" x2="18" y2="6"
          stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="24" y1="12" x2="30" y2="6"
          stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Node dots -->
    <circle cx="18" cy="6" r="2.1" fill="#22C55E"/>
    <circle cx="24" cy="20" r="2.1" fill="#22C55E"/>
    <circle cx="30" cy="6" r="2.1" fill="#22C55E"/>
  </g>

  <!-- Text: black -->
  <text x="88" y="42"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
        font-size="24"
